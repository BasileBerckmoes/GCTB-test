version: "3.8"
services:
  doo-training:
    build: .
    network_mode: "host"
    container_name: doo-training-dev
    restart: unless-stopped
    ports:
      - "8080:80"

  node:
    image: node:20-alpine
    container_name: doo-training-node-dev
    network_mode: "host"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: npm run dev
