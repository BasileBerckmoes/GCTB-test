version: "3.8"
services:
  doo-training:
    build: .
    container_name: doo-training-prod
    restart: unless-stopped
    networks:
      - proxy
    labels:
      # Traefik labels — customize the Host rule with your real domain!
      - "traefik.enable=true"
      - "traefik.http.routers.doo-training.rule=Host(`mil.artugar.com`)"
      - "traefik.http.routers.doo-training.entrypoints=https"
      - "traefik.http.routers.doo-training.tls=true"
      - "traefik.http.routers.doo-training.tls.certresolver=letsencrypt"
      - "traefik.http.services.doo-training.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
